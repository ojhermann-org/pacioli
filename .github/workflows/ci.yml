name: CI

on:
  push:
    branches: [main]
  pull_request:
  # The checks must also run on the merge queue's temporary branches, or a
  # queued PR waits forever for a status that never reports.
  merge_group:

# Newer pushes to the same branch supersede in-flight runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The fast hooks: nixfmt, deadnix, statix, markdownlint, and whitespace/hygiene
  # — exactly the local pre-commit set, so CI == `nix flake check` (one source of
  # truth). The full Lean compile (a `lake build` job) will return alongside the
  # mechanics.
  hooks:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix flake check -L
