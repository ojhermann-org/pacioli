name: CI

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to the same branch supersede in-flight runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job A — the fast hooks: nixfmt, deadnix, statix, markdownlint, hygiene, and
  # the `no-sorry` Lean guard. This is exactly the local pre-commit set, so
  # CI == `nix flake check` (one source of truth). It CANNOT run `lake build`:
  # elan/Lake need network that the flake-check sandbox denies. That is Job B.
  hooks:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix flake check -L

  # Job B — the full Lean compile. `lake build` recompiles the kernel, which
  # re-checks every proof (something `no-sorry` cannot do). `lean-action` reads
  # `lean-toolchain`, installs elan, runs `lake exe cache get` for the mathlib
  # olean cache, and caches build artifacts between runs. We name both libraries
  # so the boundary `Examples` (not in defaultTargets) is verified too.
  lean:
    name: lake build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build-args: "Pacioli Examples"
