name = "pacioli"
defaultTargets = ["Pacioli"]

# Project-wide Lean options. These mirror Mathlib's own hygiene settings so the
# mechanics are held to the same standard as the library they build on:
#   - `autoImplicit`/`relaxedAutoImplicit = false` forbid Lean from silently
#     auto-binding an unbound identifier as an implicit argument — a common
#     source of subtly-wrong signatures. Every variable is declared on purpose.
#   - `pp.unicode.fun` pretty-prints `fun x => e` with the `↦` arrow.
[leanOptions]
autoImplicit = false
relaxedAutoImplicit = false
pp.unicode.fun = true

# Mathlib, pinned to a released tag whose `lean-toolchain` matches ours exactly
# (v4.32.0). The exact match is what makes `lake exe cache get` able to fetch
# prebuilt `.olean`s instead of compiling Mathlib from source.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.32.0"

[[lean_lib]]
name = "Pacioli"
